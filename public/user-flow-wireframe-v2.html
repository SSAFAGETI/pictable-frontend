<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>찰칵밥상 사용자 플로우 v2</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        margin: 0;
        background: #f8f3eb;
        color: #2a211b;
        font-family: Pretendard, "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        color: #f45100;
        font-weight: 900;
      }

      .card {
        max-width: 560px;
        padding: 32px;
        border: 1px solid rgba(42, 33, 27, 0.14);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 20px 70px rgba(42, 33, 27, 0.14);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>찰칵밥상 사용자 플로우 v2</h1>
      <p>최신 사용자 플로우 문서를 불러오는 중입니다.</p>
      <p><a href="/user-flow-wireframe.html">문서가 열리지 않으면 여기로 이동하세요.</a></p>
    </div>
    <script>
      ;(async () => {
        const response = await fetch('/user-flow-wireframe.html', { cache: 'no-store' })
        const html = await response.text()
        document.open()
        document.write(html)
        document.close()
      })().catch(() => {
        document.body.classList.add('load-failed')
      })
    </script>
  </body>
</html>
